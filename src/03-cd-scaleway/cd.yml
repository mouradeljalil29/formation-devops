name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

# N'exécuter le déploiement que si le CI s'est terminé avec succès
jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - run: echo "CI passed for ${{ github.event.workflow_run.head_sha }}"

  # ------------------------------------------------------------------ #
  # Déploiement Staging — automatique après succès du CI sur main       #
  # ------------------------------------------------------------------ #
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: check
    environment: staging   # Environment GitHub → secrets isolés par env

    steps:
      - uses: actions/checkout@v5

      # Écrire la clé SSH dans un fichier temporaire avant toute connexion
      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Deploy to Scaleway instance (staging)
        # Connexion SSH à l'instance Scaleway et mise à jour du conteneur
        # Les secrets sont configurés dans GitHub → Settings → Environments → staging
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/ssh_key \
              ubuntu@${{ secrets.INSTANCE_IP }} \
              "echo '$GHCR_TOKEN' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
               cd /opt/app && \
               GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }} APP_VERSION=${{ needs.check.outputs.sha }} docker compose up -d --no-build"

      - name: Smoke test staging
        run: |
          sleep 5
          curl --fail http://${{ secrets.INSTANCE_IP }}/api/health

  # ------------------------------------------------------------------ #
  # Déploiement Production — avec approbation manuelle                   #
  # ------------------------------------------------------------------ #
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [check, deploy-staging]
    environment: production   # Approbation requise dans GitHub Environments

    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

      - name: Deploy to Scaleway instance (production)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i /tmp/ssh_key \
              ubuntu@${{ secrets.INSTANCE_IP }} \
              "echo '$GHCR_TOKEN' | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
               cd /opt/app && \
               docker pull ghcr.io/${{ github.repository_owner }}/formation-devops:${{ needs.check.outputs.sha }} && \
               GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }} APP_VERSION=${{ needs.check.outputs.sha }} docker compose up -d --no-build"

      - name: Verify production health
        run: |
          sleep 5
          curl --fail http://${{ secrets.INSTANCE_IP }}/api/health
