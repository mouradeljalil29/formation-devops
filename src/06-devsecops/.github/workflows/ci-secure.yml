name: CI with Security Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/app/06-devsecops
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/app/06-devsecops/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ------------------------------------------------------------------ #
  # Security gate 1 — Détection de secrets                              #
  # ------------------------------------------------------------------ #
  secret-scan:
    name: Secret Detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # Historique complet pour scanner tous les commits
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------ #
  # Security gate 2 — Analyse statique (SAST)                          #
  # ------------------------------------------------------------------ #
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ------------------------------------------------------------------ #
  # Security gate 3 — Scan de l'image Docker                           #
  # ------------------------------------------------------------------ #
  image-scan:
    name: Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build -t app:${{ github.sha }} src/app/06-devsecops

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  publish:
    name: Publish image
    runs-on: ubuntu-latest
    needs: [lint-and-test, secret-scan, sast, image-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: src/app/06-devsecops
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/formation-devops:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
